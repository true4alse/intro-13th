<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그린컴퓨터아카데미 13기 친구들 소개페이지</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 60px 20px;
            min-height: 100vh;
            font-family: Arial, "Noto Sans KR", sans-serif;
            background-color: #f2f8f4;
            color: #222;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 50px;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 80, 40, 0.1);
        }

        h1 {
            margin: 0 0 16px;
            color: #168348;
            font-size: 32px;
            text-align: center;
        }

        p {
            margin-bottom: 40px;
            color: #666;
            font-size: 16px;
            line-height: 1.7;
            text-align: center;
        }

        ul {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        li {
            margin-bottom: 14px;
        }

        li:last-child {
            margin-bottom: 0;
        }

        a {
            display: block;
            padding: 18px 24px;
            color: #168348;
            font-size: 17px;
            font-weight: bold;
            text-decoration: none;
            background-color: #edf8f1;
            border: 1px solid #cce8d6;
            border-radius: 12px;
            transition: 0.3s;
        }

        a:hover {
            color: #ffffff;
            background-color: #168348;
            border-color: #168348;
            transform: translateX(8px);
        }

        @media (max-width: 600px) {
            body {
                padding: 30px 16px;
            }

            .container {
                padding: 35px 20px;
            }

            h1 {
                font-size: 25px;
            }

            a {
                padding: 16px;
                font-size: 15px;
            }
        }
    </style>
</head>

<body>
    <main class="container">
        <h1>그린컴퓨터아카데미 13기 모둠 활동</h1>

        <p>
            각 링크를 클릭하시면 각 모둠의 기본정보와<br>
            만화 프로필 사진을 확인할 수 있습니다.
        </p>

        <ul>
            <li><a href="#">1모둠 소개페이지로 이동하기</a></li>
            <li><a href="#">2모둠 소개페이지로 이동하기</a></li>
            <li><a href="#">3모둠 소개페이지로 이동하기</a></li>
            <li><a href="#">4모둠 소개페이지로 이동하기</a></li>
            <li><a href="#">5모둠 소개페이지로 이동하기</a></li>
        </ul>
    </main>
</body>
</html>
